<!doctype html>
<html lang="vi">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" href="%PUBLIC_URL%/favicon.ico" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, shrink-to-fit=no"
    />
    <meta name="theme-color" content="#1890ff" />

    <!-- SEO Meta Tags -->
    <title>Thư Viện Sách Trực Tuyến | Library Online</title>
    <meta name="title" content="Thư Viện Sách Trực Tuyến - Mua Sách Online" />
    <meta
      name="description"
      content="Khám phá hàng ngàn đầu sách hấp dẫn, thanh toán dễ dàng qua MoMo và nhận hàng nhanh chóng."
    />
    <meta
      name="keywords"
      content="sách, mua sách online, thư viện, thanh toán momo"
    />

    <!-- Open Graph / Facebook (Hiển thị khi chia sẻ link) -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://your-domain.com/" />
    <meta
      property="og:title"
      content="Thư Viện Sách Trực Tuyến | Library Online"
    />
    <meta
      property="og:description"
      content="Khám phá hàng ngàn đầu sách hấp dẫn, thanh toán dễ dàng qua MoMo."
    />
    <meta property="og:image" content="%PUBLIC_URL%/logo512.png" />

    <!-- Google Fonts (Tối ưu hiển thị tiếng Việt) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />

    <link rel="apple-touch-icon" href="%PUBLIC_URL%/logo192.png" />
    <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />

    <style>
      /* Style cơ bản để tránh hiện tượng nháy font/màu khi đang tải React */
      body {
        margin: 0;
        padding: 0;
        font-family:
          "Inter",
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          Roboto,
          sans-serif;
        background-color: #f4f7fe;
      }

      /* Màn hình loading chờ React khởi động (tùy chọn) */
      #preloader {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        display: flex;
        justify-content: center;
        align-items: center;
        background: #fff;
        z-index: 9999;
      }
    </style>
  </head>
  <body>
    <noscript>Bạn cần kích hoạt JavaScript để chạy ứng dụng này.</noscript>

    <!-- Bạn có thể xóa div preloader này nếu không muốn dùng màn hình chờ -->
    <div id="root"></div>

    <!-- Đoạn script ẩn preloader khi React đã render -->
    <script>
      window.onload = function () {
        const preloader = document.getElementById("preloader");
        if (preloader) preloader.style.display = "none";
      };
    </script>
  </body>
</html>
